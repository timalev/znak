apply plugin: 'com.android.application'

android {
    signingConfigs {
        config {
            keyAlias 'timalev'
            keyPassword 'soprod'
            storeFile file('/home/1/bizone.keystore')
            storePassword 'soprod'
        }
    }
    compileSdkVersion 26
    buildToolsVersion '27.0.3'
    defaultConfig {
        applicationId "io.cordova.test2_6720b"
        minSdkVersion 19
        targetSdkVersion 26
        versionCode 24
        versionName "3.1.10"
        testInstrumentationRunner "android.support.test.runner.AndroidJUnitRunner"
